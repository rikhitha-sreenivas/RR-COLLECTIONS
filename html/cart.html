<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Garage | R&R COLLECTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --grey: #1a1a1a;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(10, 10, 10, 0.9);
            border-bottom: 1px solid #222;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .container {
            padding: 80px 8%;
            min-height: 80vh;
        }

        h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 40px;
            border-left: 4px solid var(--gold);
            padding-left: 20px;
        }

        .cart-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 50px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #111;
            border: 1px solid #222;
            margin-bottom: 15px;
        }

        .item-info h4 {
            margin: 0;
            color: var(--gold);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 10px;
            padding: 0;
        }

        .order-summary {
            background: #111;
            padding: 30px;
            border: 1px solid var(--gold);
            height: fit-content;
        }

        .order-summary h3 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            margin-top: 0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 0.9rem;
            color: #888;
        }

        .summary-row.total {
            color: var(--white);
            font-size: 1.1rem;
            border-top: 1px solid #333;
            padding-top: 15px;
            margin-top: 15px;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background: var(--white);
        }

        #empty-msg {
            text-align: center;
            color: #555;
            padding: 40px;
            border: 1px dashed #333;
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">R&R COLLECTIONS</div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="./bikes.html">Motorcycles</a></li>
            <li><a href="./cars.html">Apsara</a></li>
            <li><a href="./cart.html" style="color:var(--gold)">Garage (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2>Your Selected Machines</h2>

        <div class="cart-wrapper" id="main-wrapper">
            <div id="cart-items" class="cart-items-list"></div>

            <div class="order-summary">
                <h3>Fleet Summary</h3>
                <hr style="border: 0; border-top: 1px solid #222;">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row">
                    <span>GST (18%):</span>
                    <span id="tax">₹0</span>
                </div>
                <div class="summary-row total">
                    <span><strong>Total:</strong></span>
                    <span id="grand-total"><strong>₹0</strong></span>
                </div>
                <button class="checkout-btn" onclick="checkout()">Proceed to Secure Fleet</button>
            </div>
        </div>
    </main>

    <script>
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('RE_GARAGE')) || [];
            const container = document.getElementById('cart-items');
            const countLabel = document.getElementById('cart-count');
            const mainWrapper = document.getElementById('main-wrapper');

            if (countLabel) countLabel.innerText = cart.length;

            if (cart.length === 0) {
                mainWrapper.innerHTML = `
                <div id="empty-msg">
                    <h3>Your Garage is empty.</h3>
                    <br>
                    <a href="./bikes.html" style="color:var(--gold); text-decoration:none;">Browse Motorcycles</a> | 
                    <a href="./cars.html" style="color:var(--gold); text-decoration:none;">Browse Apsara Collection</a>
                </div>`;
                return;
            }

            let subtotal = 0;
            container.innerHTML = '';

            cart.forEach((item, index) => {
                let name = item.name || item;
                let price = item.price ? item.price : 25000000;

                let priceText = price >= 10000000
                    ? `₹${(price / 10000000).toFixed(2)} Cr`
                    : `₹${(price / 100000).toFixed(2)} Lakh`;

                subtotal += price;

                container.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <h4>${name}</h4>
                        <p style="color:#555; font-size:0.8rem;">Ready for delivery</p>
                    </div>
                    <div class="item-price">
                        <span style="color:var(--gold); font-weight:600;">${priceText}</span>
                        <br>
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>`;
            });

            const tax = subtotal * 0.18;
            const total = subtotal + tax;

            const formatTotal = (val) => val >= 10000000
                ? `₹${(val / 10000000).toFixed(2)} Cr`
                : `₹${(val / 100000).toFixed(2)} Lakh`;

            document.getElementById('subtotal').innerText = formatTotal(subtotal);
            document.getElementById('tax').innerText = formatTotal(tax);
            document.getElementById('grand-total').innerText = formatTotal(total);
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('RE_GARAGE')) || [];
            cart.splice(index, 1);
            localStorage.setItem('RE_GARAGE', JSON.stringify(cart));
            renderCart();
        }

        function checkout() {
            const user = localStorage.getItem('RR_USER');
            if (!user) {
                alert("To proceed with the acquisition, please register your details.");
                window.location.href = "./register.html";
            } else {
                window.location.href = "./payment.html";
            }
        }

        window.onload = renderCart;
    </script>
</body>

</html>
