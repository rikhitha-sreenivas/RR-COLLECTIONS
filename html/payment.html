<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | R&R COLLECTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --black: #0A0A0A;
            --white: #FFFFFF;
            --grey: #1a1a1a;
        }

        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; margin: 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(10, 10, 10, 0.9); border-bottom: 1px solid #222; }
        .logo { font-family: 'Syncopate', sans-serif; color: var(--gold); letter-spacing: 2px; text-decoration: none; }

        .container { padding: 60px 8%; display: flex; justify-content: center; align-items: flex-start; gap: 40px; flex-wrap: wrap; }
        
        .payment-box { background: #111; border: 1px solid #222; padding: 40px; width: 100%; max-width: 500px; min-height: 450px; }
        .method-selector { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .method-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 20px; cursor: pointer; font-family: 'Syncopate', sans-serif; font-size: 0.7rem; transition: 0.3s; }
        .method-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(197, 160, 89, 0.05); }

        .payment-form { display: none; }
        .payment-form.active { display: block; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; color: #888; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--gold); }

        .qr-container { text-align: center; padding: 20px; }
        .qr-placeholder { background: white; padding: 15px; width: 220px; height: 220px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .qr-placeholder img { width: 100%; }
        .qr-amount { font-family: 'Syncopate', sans-serif; color: var(--gold); font-size: 1.1rem; margin: 10px 0; }

        .pay-btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .pay-btn:hover { background: var(--white); }

        .order-preview { background: #111; padding: 30px; border: 1px solid var(--gold); width: 300px; }
        .amount-row { display: flex; justify-content: space-between; margin: 15px 0; font-size: 0.9rem; }
        .final-amount { color: var(--gold); font-weight: 700; font-size: 1.2rem; border-top: 1px solid #333; padding-top: 15px; }

        #success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">R&R COLLECTIONS</a>
    </nav>

    <div class="container">
        <div class="payment-box">
            <div class="method-selector">
                <button class="method-btn active" onclick="switchMethod('card', this)">Credit/Debit Card</button>
                <button class="method-btn" onclick="switchMethod('qr', this)">UPI Scanner</button>
            </div>

            <div id="card-form" class="payment-form active">
                <div class="input-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="Enter Full Name" required>
                </div>
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="XXXX XXXX XXXX XXXX" maxlength="16">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="input-group">
                        <label>Expiry</label>
                        <input type="text" placeholder="MM/YY">
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="password" placeholder="***">
                    </div>
                </div>
                <button class="pay-btn" onclick="processPayment()">Authorize Payment</button>
            </div>

            <div id="qr-form" class="payment-form">
                <div class="qr-container">
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Scan to Pay with GPay, PhonePe, or Paytm</p>
                    <div class="qr-placeholder">
                        <img id="dynamic-qr" src="" alt="Dynamic UPI QR Code">
                    </div>
                    <div class="qr-amount" id="qr-total-display">₹0.00</div>
                    <p style="font-size: 0.7rem; color: var(--gold); letter-spacing: 1px;">MERCHANT: R&R COLLECTIONS</p>
                </div>
                <button class="pay-btn" onclick="processPayment()">I have Paid</button>
            </div>
        </div>

        <div class="order-preview">
            <h3 style="font-family: 'Syncopate'; font-size: 0.8rem;">Checkout Summary</h3>
            <div class="amount-row">
                <span>Fleet Size:</span>
                <span id="item-count">0</span>
            </div>
            <div class="amount-row final-amount">
                <span>Total Amount:</span>
                <span id="display-total">₹0</span>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <h1 style="font-family: 'Syncopate'; color: var(--gold);">Acquisition Complete</h1>
        <p>Your machines are being prepped for the garage.</p>
        <br>
        <a href="../index.html" style="color: white; border: 1px solid var(--gold); padding: 10px 30px; text-decoration: none; font-size: 0.8rem;">Return to Hub</a>
    </div>

    <script>
        function switchMethod(method, btn) {
            document.querySelectorAll('.payment-form').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(method + '-form').classList.add('active');
            btn.classList.add('active');
        }

        function loadPaymentDetails() {
            const cart = JSON.parse(localStorage.getItem('RE_GARAGE')) || [];
            let subtotal = 0;

            cart.forEach(item => {
                let price = item.price ? item.price : 25000000;
                subtotal += price;
            });

            const total = subtotal + (subtotal * 0.18);
            
            const formatted = total >= 10000000 
                ? `₹${(total / 10000000).toFixed(2)} Cr` 
                : `₹${(total / 100000).toFixed(2)} Lakh`;

            // UI Displays
            document.getElementById('item-count').innerText = cart.length;
            document.getElementById('display-total').innerText = formatted;
            document.getElementById('qr-total-display').innerText = formatted;

            // --- REAL DYNAMIC UPI QR GENERATION ---
            // 1. Put your REAL UPI ID here (e.g. 9876543210@paytm)
            const myUpiId = "9705100375@upi"; 
            const myName = "R&R COLLECTIONS";
            
            // 2. Construct the UPI Payment Link (Amount must be a raw number)
            const upiLink = `upi://pay?pa=${myUpiId}&pn=${encodeURIComponent(myName)}&am=${total.toFixed(2)}&cu=INR`;
            
            // 3. Generate QR using the Link
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
            
            document.getElementById('dynamic-qr').src = qrUrl;
        }

        function processPayment() {
    // 1. Identify which form is currently active (Card or QR)
    const activeForm = document.querySelector('.payment-form.active');
    const activeBtn = activeForm.querySelector('.pay-btn');

    // 2. FOR CARD USERS: Check if inputs are empty
    if (activeForm.id === 'card-form') {
        const inputs = activeForm.querySelectorAll('input');
        let isFormValid = true;

        inputs.forEach(input => {
            if (input.value.trim() === "") {
                isFormValid = false;
                input.style.borderColor = "red"; // Highlight the empty field
            } else {
                input.style.borderColor = "#333"; // Reset if filled
            }
        });

        if (!isFormValid) {
            alert("Please complete all card details to authorize the transaction.");
            return; // Stop the process here
        }
    }

    // 3. IF VALID (or if using QR): Start the simulation
    activeBtn.innerText = "Verifying Transaction...";
    activeBtn.disabled = true;
    activeBtn.style.opacity = "0.5";

    setTimeout(() => {
        localStorage.removeItem('RE_GARAGE');
        document.getElementById('success-overlay').style.display = 'flex';
    }, 3000);
}

        window.onload = loadPaymentDetails;
    </script>
</body>
</html>
