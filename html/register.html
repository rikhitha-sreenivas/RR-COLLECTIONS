<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Fleet | R&R COLLECTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #C5A059; --black: #0A0A0A; --white: #FFFFFF; }
        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-container { background: #111; padding: 40px; border: 1px solid #222; width: 100%; max-width: 400px; text-align: center; border-radius: 4px; }
        .auth-container h2 { font-family: 'Syncopate', sans-serif; color: var(--gold); margin-bottom: 30px; letter-spacing: 4px; font-size: 1.2rem; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 8px; }
        .input-group input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: white; border-radius: 2px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--gold); }
        .reg-btn { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .reg-btn:hover { background: var(--white); }
        .auth-footer { margin-top: 20px; font-size: 0.8rem; color: #555; }
        .auth-footer a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>REGISTRATION</h2>
        <form id="regForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="regPass" required>
            </div>
            <button type="submit" class="reg-btn">Create Account</button>
        </form>
        <div class="auth-footer">
            Already a member? <a href="./login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;

            const userData = {
                name: name,
                email: email,
                password: pass,
                isLoggedIn: true
            };

            localStorage.setItem('RR_USER', JSON.stringify(userData));

            alert("Welcome to R&R COLLECTIONS, " + name + "!");
            
            window.location.href = "./cart.html";
        });
    </script>
</body>
</html>
